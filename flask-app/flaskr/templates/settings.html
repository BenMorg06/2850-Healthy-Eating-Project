{% extends 'base.html' %}
{% block title %}Settings - Healthy Dietary System{% endblock %}
{% block content %}
<div class="container">
    <h1>Settings</h1>
    <form method="post" class="settings-form">
        <div class="form-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" value="{{ subscriber.height or '' }}" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" value="{{ subscriber.weight or '' }}" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="sex">Sex:</label>
            <select id="sex" name="sex" required>
                <option value="Male" {% if subscriber.sex == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if subscriber.sex == 'Female' %}selected{% endif %}>Female</option>
            </select>
        </div>
        <div class="form-group">
            <label for="activity_level">Activity Level:</label>
            <select id="activity_level" name="activity_level" required>
                <option value="Sedentary" {% if subscriber.activity_level == 'Sedentary' %}selected{% endif %}>Sedentary (little to no exercise)</option>
                <option value="Lightly Active" {% if subscriber.activity_level == 'Lightly Active' %}selected{% endif %}>Lightly Active (light exercise 1-3 days/week)</option>
                <option value="Moderately Active" {% if subscriber.activity_level == 'Moderately Active' %}selected{% endif %}>Moderately Active (moderate exercise 3-5 days/week)</option>
                <option value="Very Active" {% if subscriber.activity_level == 'Very Active' %}selected{% endif %}>Very Active (hard exercise 6-7 days/week)</option>
                <option value="Extra Active" {% if subscriber.activity_level == 'Extra Active' %}selected{% endif %}>Extra Active (very hard exercise & physical job)</option>
            </select>
        </div>
        <button type="submit" class="btn">Save Settings</button>
    </form>
</div>
{% endblock %}
