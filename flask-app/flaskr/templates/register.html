<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login / Register - Healthy Dietary System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="auth-brand">
                <div class="brand-mark large">🍽</div>
                <h1>Healthy Dietary System</h1>
                <p>Register to create an account and gain access to all features.</p>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-card">
                <div class="auth-tab-row">
                    <a id="loginTab" class="auth-tab active" href="{{ url_for('login') }}">Already have an account? Login here</a>
                </div>

                <!-- REGISTER -->
                <form id="registerForm" class="auth-form active" action="{{ url_for('register') }}" method="POST">
                    <h2>Register</h2>

                    <div class="auth-grid">
                        <div>
                            <label>Email</label>
                            <input type="email" id="regEmail" name="email" placeholder="Enter your email" required />
                        </div>

                        <div>
                            <label>Phone Number (Optional)</label>
                            <input type="text" id="regPhone" name="phone" placeholder="Enter phone number" />
                        </div>

                        <div>
                            <label>Gender</label>
                            <select id="regGender" name="gender" required>
                                <option value="">Select gender</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                                <option>Prefer not to say</option>
                            </select>
                        </div>

                        <div>
                            <label>Username</label>
                            <input type="text" id="regUsername" name="username" placeholder="Enter username" required />
                        </div>

                        <div>
                            <label>Password</label>
                            <input type="password" id="regPassword" name="password" placeholder="Enter password" required />
                        </div>

                        <div>
                            <label>Confirm Password</label>
                            <input type="password" id="regConfirmPassword" name="confirm_password" placeholder="Confirm password" required />
                        </div>

                        <div class="full-width">
                            <label>Weight (Optional)</label>
                            <input type="number" id="regWeight" name="weight" placeholder="Enter weight" />
                        </div>
                    </div>

                    <button type="submit" class="auth-submit {% if active_page == 'dashboard' %}active{% endif %}">
                        Create account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
