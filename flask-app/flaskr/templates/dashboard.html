{% extends "base.html" %}

{% block title %}Diary – Healthy Dietary System{% endblock %}

{% block content %}
<section class="dashboard-card metrics-card">
  <div class="metrics-card-header">
    <h3>Weekly Nutrition Metrics (Monday to Sunday)</h3>
    <div class="streak-card">
      <span class="streak-icon">🔥</span>
      <div class="streak-text">
        <strong id="streak-count">0</strong>
        <small>day streak</small>
      </div>
    </div>
  </div>

  <div class="metric-filters">
    <label><input type="checkbox" class="metric-toggle" value="calories" checked> Calories</label>
    <label><input type="checkbox" class="metric-toggle" value="fat" checked> Fat</label>
    <label><input type="checkbox" class="metric-toggle" value="protein" checked> Protein</label>
    <label><input type="checkbox" class="metric-toggle" value="carbs" checked> Carbs</label>
  </div>

  <div class="chart-wrap">
    <canvas id="weeklyMetricsChart"></canvas>
  </div>

  <div id="daily-amounts"></div>
</section>

<section class="dashboard-card feedback-card">
  <h3>How you’re doing vs NHS guidance</h3>
  <ul id="nhsFeedbackList"></ul>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/dashboard-metrics.js') }}"></script>
{% endblock %}
